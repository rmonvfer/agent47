name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Check
        run: ./gradlew check
        env:
          CI: "true"

      - name: Validate installer
        run: bash -n scripts/install.sh

  build:
    name: Build native (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-15-intel
            target: darwin-x86_64
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@0def53c0fd8534bc13416c9469f5be45265824fd # v1
        with:
          java-version: "25"
          distribution: graalvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Verify release version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(./gradlew properties --quiet | sed -n 's/^version: //p')"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag version $tag_version does not match project version $project_version" >&2
            exit 1
          fi

      - name: Build native image
        run: ./gradlew :agent47-app:nativeCompile
        env:
          CI: "true"

      - name: Rename binary
        run: mv agent47-app/build/native/nativeCompile/agent47 agent47-${{ matrix.target }}

      - name: Smoke test binary
        shell: bash
        run: |
          ./agent47-${{ matrix.target }} --help
          expected_version="agent47 ${GITHUB_REF_NAME#v}"
          actual_version="$(./agent47-${{ matrix.target }} --version)"
          if [[ "$actual_version" != "$expected_version" ]]; then
            echo "Expected '$expected_version', got '$actual_version'" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agent47-${{ matrix.target }}
          path: agent47-${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/agent47-*/; do
            cp "$dir"agent47-* release/
          done
          cd release
          sha256sum agent47-* > checksums-sha256.txt

      - name: Attest release assets
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: release/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: release/*
